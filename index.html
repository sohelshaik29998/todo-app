<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="watermark">SHAIK SOHEL</div>

<h1>My To-Do List</h1>

<label>Task Title</label><br>
<input type="text" id="taskInput" placeholder="Enter task title">
<br><br>

<label>Task Subtitle</label><br>
<input type="text" id="descInput" placeholder="Enter subtitle">
<br><br>

<label>Task Details</label><br>
<input type="text" id="detailInput" placeholder="Enter full details">
<br><br>

<button onclick="addTask()">Add Task</button>

<ul id="taskList"></ul>

<script src="script.js"></script>

</body>
</html>
